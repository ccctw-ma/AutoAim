<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoAim Overlay</title>
    <style>
      html,
      body,
      canvas {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      body {
        pointer-events: none;
      }

      canvas {
        display: block;
        left: 0;
        position: absolute;
        top: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="overlayCanvas"></canvas>
    <canvas id="cursorCanvas"></canvas>
    <script src="./overlay.js"></script>
  </body>
  </html>
