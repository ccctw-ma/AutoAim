name: Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
      previous_package_url:
        description: Optional previous AutoAimReview-windows-x64.zip URL for delta generation
        required: false
      previous_manifest_url:
        description: Optional previous AutoAimReview-windows-x64-manifest.json URL for delta generation
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Download previous package assets
        id: previous
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path dist\previous -Force | Out-Null

          $packageUrl = "${{ github.event.inputs.previous_package_url }}"
          $manifestUrl = "${{ github.event.inputs.previous_manifest_url }}"
          if (-not [string]::IsNullOrWhiteSpace($packageUrl) -and -not [string]::IsNullOrWhiteSpace($manifestUrl)) {
            Invoke-WebRequest -Uri $packageUrl -OutFile dist\previous\AutoAimReview-windows-x64.zip
            Invoke-WebRequest -Uri $manifestUrl -OutFile dist\previous\AutoAimReview-windows-x64-manifest.json
            "available=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $latest = gh release view --json tagName --jq .tagName 2>$null
          if ([string]::IsNullOrWhiteSpace($latest)) {
            "available=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          gh release download $latest `
            --pattern AutoAimReview-windows-x64.zip `
            --pattern AutoAimReview-windows-x64-manifest.json `
            --dir dist\previous

          if ((Test-Path dist\previous\AutoAimReview-windows-x64.zip) -and (Test-Path dist\previous\AutoAimReview-windows-x64-manifest.json)) {
            "available=true" >> $env:GITHUB_OUTPUT
          } else {
            "available=false" >> $env:GITHUB_OUTPUT
          }

      - name: Run Rust tests
        shell: pwsh
        run: |
          cargo test -p autoaim-core -p autoaim-ipc -p autoaim-runtime -p autoaim-capture -p autoaim-infer -p autoaim-cli
            cargo check -p autoaim-infer --features directml,cuda,tensorrt

      - name: Run Rust CLI E2E
        shell: pwsh
        run: |
          cargo build -p autoaim-cli
          python tests\rust_cli_e2e.py

      - name: Build package with delta
        if: ${{ steps.previous.outputs.available == 'true' }}
        shell: pwsh
        run: |
          python scripts\build_windows_package.py `
            --version "${{ steps.version.outputs.value }}" `
            --output-dir dist\windows `
            --previous-package dist\previous\AutoAimReview-windows-x64.zip `
            --previous-manifest dist\previous\AutoAimReview-windows-x64-manifest.json

      - name: Verify package delta
        if: ${{ steps.previous.outputs.available == 'true' }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $oldManifest = Get-Content dist\previous\AutoAimReview-windows-x64-manifest.json -Raw | ConvertFrom-Json
          $delta = "dist\windows\AutoAimReview-windows-x64-$($oldManifest.version)-to-$version.delta.json"
          python scripts\verify_delta_update.py `
            --old-package dist\previous\AutoAimReview-windows-x64.zip `
            --delta $delta `
            --new-manifest dist\windows\AutoAimReview-windows-x64-manifest.json

      - name: Build package
        if: ${{ steps.previous.outputs.available != 'true' }}
        shell: pwsh
        run: |
          python scripts\build_windows_package.py `
            --version "${{ steps.version.outputs.value }}" `
            --output-dir dist\windows

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler not found at $iscc"
          }
          & $iscc `
            /DAppVersion="${{ steps.version.outputs.value }}" `
            /DSourceDir="$PWD\dist\windows\package-root" `
            /DOutputDir="$PWD\dist\windows" `
            windows\installer\AutoAimReview.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoAimReview-windows-x64
          path: dist/windows/*

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: AutoAim Review ${{ steps.version.outputs.value }}
          files: dist/windows/*
